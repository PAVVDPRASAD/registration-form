<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Form</title>
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    </head>
    <body>
        <div class="main-container">
            <div class="tab-cont">
                <button class="menu-btn active-btn" type="button" onclick="switchTab(0)">Signup</button>
                <button class="menu-btn" type="button" onclick="switchTab(1)">Login</button>
            </div>
            <hr />
            
            <ul class="" id="subTabCont">
                <li><button class="sub-tab">Personal</button></li>
                <li><button class="sub-tab">Address</button></li>
                <li><button class="sub-tab">Education</button></li>
            </ul>


            <form class="tab active" id="signupForm">
                <div class="form-container  ">
                    <div class="profile-container">
                        <label class="profile-preview">
                            <img id="profilePreview" alt="">
                            <input type="file" accept="image/*" id="profilePic" onchange="previewImage(event)"/>
                        </label>
                        <p style="font-weight: bold; font-size: 16px;">Profile Picture</p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="text" id="first" placeholder="First Name"/>
                            <label for="first">First Name</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="text" id="last" placeholder="Last Name"/>
                            <label for="last">Last Name</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="email" id="email" placeholder="Email"/>
                            <label for="email">Email</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="password" id="password" placeholder="Password"/>
                            <label for="password">Password</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <p class="gender-label">Gender:</p>
                        <div class="radio-group">
                            <label style="margin-right: 20px;">
                                <input type="radio" name="gender" value="male" />
                                Male
                            </label>
                            <label style="margin-right: 20px;">
                                <input type="radio" name="gender" value="female" />
                                Female
                            </label>
                            <label>
                                <input type="radio" name="gender" value="other" />
                                Other
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-container ">
                    <div>
                        <div class="input-box">
                            <input type="text" id="address" placeholder="Street Address"/>
                            <label for="address">Street Address</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="text" id="city" placeholder="City"/>
                            <label for="city">City</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="text" id="state" placeholder="State"/>
                            <label for="state">State</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="number" id="zip" placeholder="Zip Code"/>
                            <label for="zip">Zip Code</label>
                        </div>
                        <p class="error"></p>
                    </div>
                </div>

                <div class="form-container ">
                    <div>
                        <div class="input-box">
                            <input type="text" id="qualification" placeholder="Qualification"/>
                            <label for="qualification">Qualification</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="text" id="skills" placeholder="Skills"/>
                            <label for="skills">Skills</label>
                        </div>
                        <p class="error"></p>
                    </div>
                   
                    <div>
                        <p class="upload-heading">Upload Certificates</p>
                        <label class="upload-box" srtyle="margin-top: 20px;">
                            <i class="bi bi-file-earmark-pdf-fill"></i>
                            <span class="upload-label">Drag & Drop to Upload or Browse</span>
                            <input type="file" accept=".pdf,.jpg,.jpeg,.png" multiple id="certification" placeholder="Certification"/>
                        </label>
                   </div>
                    
                </div>
                <!-- <div>
                    <input type="checkbox" />
                    <label>I agree to the <span style="color: blue;">Terms & Condition</span></label>
                </div> -->
                <div class="btns-container">
                    
                    <button type="button" id="prevBtn" class="submit-btn" onclick="prevStep()">Previous</button>
                    <button type="button" id="signupBtn" class="submit-btn" onclick="nextStep()">Next</button>
                </div>
                
            </form>

            <form class="tab" id="loginForm">
                <div class="form-container">
                    <div>
                        <div class="input-box">
                            <input type="text" id="user" placeholder="User Name"/>
                            <label for="user">User Name</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <div>
                        <div class="input-box">
                            <input type="password" id="password" placeholder="Password"/>
                            <label for="password">Password</label>
                        </div>
                        <p class="error"></p>
                    </div>
                    <button type="submit" id="loginBtn" class="submit-btn">Login</button>
                </div>
            </form>

            <div id="homepage" class="tab  homepage">
                <h1>Welcome Home</h1>
                <p>You have successfully logged in</p>
                <!-- <a href="companyWebpage/index.html">company profile</a> -->
                <button type="button" 
                id="logoutBtn" 
                onclick="location.reload()"
                class="btn btn-warning logoutBtn">Logout</button>
            </div>
            
        </div>

        <script src="index.js"></script>
    </body>
</html>
